<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本沖繩行 2026 (富士藍度假版)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght=700&family=Noto+Sans+TC:wght=300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // 富士藍主題色彩配置（保留原始設定）
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Noto Sans TC', 'sans-serif'],
                        cute: ['Comic Neue', 'Noto Sans TC', 'sans-serif']
                    },
                    colors: {
                        fuji: {
                            bg: '#F3F7FA',       
                            paper: '#FFFFFF',    
                            primary: '#4A7C9D',  
                            accent: '#F4A261',   
                            dark: '#2B4251',     
                            light: '#E2EDF3'     
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F3F7FA; color: #2B4251; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans min-h-screen pb-24 flex justify-center">

    <div class="w-full max-w-md bg-fuji-bg min-h-screen shadow-xl relative flex flex-col">
        
        <header class="bg-fuji-primary p-4 pt-6 pb-6 text-center relative rounded-b-[1.5rem] shadow-md overflow-hidden">
            <div class="absolute -right-6 -top-6 text-fuji-secondary/20 text-7xl"><i class="fa-solid fa-cloud"></i></div>
            <div class="absolute -left-4 top-12 text-fuji-secondary/20 text-5xl"><i class="fa-solid fa-sun"></i></div>
            <div class="text-[10px] tracking-widest text-fuji-light font-bold mb-0.5 font-cute">✨ OKINAWA TRIP MEMO ✨</div>
            <h1 class="font-cute text-2xl font-bold text-white tracking-wide flex items-center justify-center gap-2">
                <i class="fa-solid fa-umbrella-beach text-fuji-accent"></i> 日本沖繩行
            </h1>
            <p class="text-[11px] text-fuji-light/90 mt-1 bg-white/10 inline-block px-3 py-0.5 rounded-full backdrop-blur-sm tracking-wide">
                <i class="fa-regular fa-calendar-days mr-1 text-fuji-accent"></i> 2026 / 10 / 01 － 10 / 04
            </p>
        </header>

        <main class="flex-1 p-3 overflow-y-auto">
            <section id="page-plan" class="tab-content block"></section>
            <section id="page-guide" class="tab-content hidden"></section>
            <section id="page-shopping" class="tab-content hidden"></section>
            <section id="page-wallet" class="tab-content hidden text-xs"></section>
            <section id="page-lists" class="tab-content hidden"></section>
            <section id="page-info" class="tab-content hidden"></section>
        </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-fuji-paper/95 backdrop-blur-md border-t border-fuji-light flex justify-around items-center py-1.5 z-50 shadow-lg rounded-t-xl px-1">
            <button onclick="switchTab('plan')" id="nav-plan" class="nav-btn flex flex-col items-center text-fuji-accent transition-all"><i class="fa-solid fa-compass text-sm"></i><span class="text-[9px] font-bold mt-0.5">行程</span></button>
            <button onclick="switchTab('guide')" id="nav-guide" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-map-location-dot text-sm"></i><span class="text-[9px] font-bold mt-0.5">地圖</span></button>
            <button onclick="switchTab('shopping')" id="nav-shopping" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-cart-shopping text-sm"></i><span class="text-[9px] font-bold mt-0.5">購物</span></button>
            <button onclick="switchTab('wallet')" id="nav-wallet" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-wallet text-sm"></i><span class="text-[9px] font-bold mt-0.5">錢包</span></button>
            <button onclick="switchTab('lists')" id="nav-lists" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-check-square text-sm"></i><span class="text-[9px] font-bold mt-0.5">準備</span></button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-circle-info text-sm"></i><span class="text-[9px] font-bold mt-0.5">資訊</span></button>
        </nav>
    </div>

    <script>
        const SHEET_ID = '1H0pLIy9Cg1cMI673vZprheKm-DB6DisVU3U-24Q4Z7Y';
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
        const SHOPPING_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E8%B3%BC%E7%89%A9`;
        const CHECKLIST_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=%E6%BA%96%E5%82%96`;
        const SHEET_EDIT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?gid=0#gid=0`;
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzgMLJsLB5NSEL3r0t4_ge0QA-mYjQ1_NBI_hntFYsTVWJco9zi7IJsBXzPwC6g5A7Jkg/exec';

        let cloudShoppingItems = [];
        let currentPostType = 'local'; 
        let walletCollapsedDays = {};
        let shoppingCollapsedStores = {};
        let checklistCollapsedCategories = {};
        let globalChecklistItems = [];

        // 🚀 初始化：同步載入所有獨立的頁籤 HTML 檔案
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadTab('plan', 'tab-plan.html'),
                loadTab('guide', 'tab-guide.html'),
                loadTab('shopping', 'tab-shopping.html'),
                loadTab('wallet', 'tab-wallet.html'),
                loadTab('lists', 'tab-lists.html'),
                loadTab('info', 'tab-info.html')
            ]);

            // 當所有頁籤 HTML 載入完畢後，執行原本的資料初始化
            const editBtn = document.getElementById('edit-sheet-btn');
            if (editBtn) editBtn.href = SHEET_EDIT_URL;
            fetchBotExchangeRate();
            fetchTravelPlan();
            fetchCloudShopping();
            fetchCloudChecklist(); 
            initWalletDateTime();
            renderExpenses();
            initCalc();
        });

        // 🚀 動態非同步載入獨立 HTML 檔案之核心函式
        async function loadTab(tabId, fileName) {
            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error(`無法載入 ${fileName}`);
                const html = await response.text();
                document.getElementById(`page-${tabId}`).innerHTML = html;
            } catch (err) {
                console.error(err);
                document.getElementById(`page-${tabId}`).innerHTML = `<div class="p-4 text-xs text-red-500">❌ 載入 ${fileName} 失敗，請確認檔案路徑是否正確。</div>`;
            }
        }

        async function fetchBotExchangeRate() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/JPY');
                if (!res.ok) throw new Error();
                const data = await res.json();
                const twdRate = data.rates.TWD;
                if (twdRate) {
                    const finalRate = parseFloat(twdRate).toFixed(4);
                    const rateInput = document.getElementById('exchange-rate');
                    if(rateInput) {
                        rateInput.value = (parseFloat(finalRate)).toFixed(3);
                        const tag = document.getElementById('bot-rate-tag');
                        if (tag) tag.classList.remove('hidden');
                        renderExpenses();
                    }
                }
            } catch (e) {
                console.log("無法取得即時匯率，啟用預設值 0.215");
            }
        }

        function toggleSection(contentId, arrowId) {
            const content = document.getElementById(contentId);
            const arrow = document.getElementById(arrowId);
            if (!content) return;
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                if (arrow) arrow.className = "fa-solid fa-chevron-down text-[10px] transition-transform text-fuji-primary";
            } else {
                content.classList.add('hidden');
                if (arrow) arrow.className = "fa-solid fa-chevron-right text-[10px] transition-transform text-fuji-primary";
            }
        }

        function toggleDayCollapse(dateStr) {
            walletCollapsedDays[dateStr] = !walletCollapsedDays[dateStr];
            renderExpenses();
        }

        function toggleStoreCollapse(storeName) {
            shoppingCollapsedStores[storeName] = !shoppingCollapsedStores[storeName];
            renderCombinedShoppingList();
        }

        function toggleChecklistCategoryCollapse(catName) {
            checklistCollapsedCategories[catName] = !checklistCollapsedCategories[catName];
            renderChecklist(globalChecklistItems);
        }

        async function fetchTravelPlan() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                parseAndRenderCSV(csvText);
                const loadingStatus = document.getElementById('loading-status');
                if (loadingStatus) loadingStatus.classList.add('hidden');
            } catch (error) {
                console.error(error);
            }
        }

        function parseAndRenderCSV(csvText) {
            const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
            if(lines.length <= 1) return;
            const headers = lines[0].split(',').map(h => h.replace(/["']/g, '').trim());
            
            const d1 = document.getElementById('day-d1'); if(d1) d1.innerHTML = '';
            const d2 = document.getElementById('day-d2'); if(d2) d2.innerHTML = '';
            const d3 = document.getElementById('day-d3'); if(d3) d3.innerHTML = '';
            const d4 = document.getElementById('day-d4'); if(d4) d4.innerHTML = '';

            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/["']/g, '').trim());
                if(currentLine.length < headers.length) continue;
                let row = {};
                headers.forEach((header, index) => { row[header] = currentLine[index]; });
                if(!row['天數'] || !row['時間'] || !row['標題']) continue;
                let dayKey = row['天數'].toLowerCase().trim();
                const targetContainer = document.getElementById(`day-${dayKey}`);
                if (!targetContainer) continue;
                let timeString = row['時間'];
                let imgHtml = '';
                if (row['圖片網址']) {
                    let parsedImg = parseImageUrl(row['圖片網址']);
                    imgHtml = `<div class="mt-2.5 rounded-xl overflow-hidden border border-fuji-light shadow-2xs max-h-40 bg-fuji-light/20 flex items-center justify-center"><img src="${parsedImg}" class="w-full h-full object-cover" onerror="this.parentElement.style.display='none'"></div>`;
                }
                let metaHtml = '';
                if (row['地點'] || row['店家/備註']) {
                    metaHtml = `<div class="bg-fuji-bg/50 p-2 rounded-xl text-[11px] text-fuji-secondary space-y-1 border border-fuji-light/40">`;
                    if (row['地點']) metaHtml += `<p class="truncate"><i class="fa-solid fa-location-dot text-fuji-primary mr-1"></i><strong>地點：</strong>${row['地點']}</p>`;
                    if (row['店家/備註']) metaHtml += `<p class="break-words"><i class="fa-solid fa-store text-fuji-primary mr-1"></i><strong>備註：</strong>${row['店家/備註']}</p>`;
                    metaHtml += `</div>`;
                }
                let buttonHtml = '';
                if (row['導航連結'] || row['官方網站']) {
                    buttonHtml = `<div class="flex gap-1.5 mt-2.5">`;
                    if (row['導航連結']) buttonHtml += `<a href="${row['導航連結']}" target="_blank" class="flex-1 bg-fuji-primary hover:bg-fuji-dark text-white rounded-lg py-1.5 text-[11px] font-bold text-center transition-all shadow-2xs flex items-center justify-center gap-1"><i class="fa-solid fa-map-location-dot"></i>地圖導航</a>`;
                    if (row['官方網站']) buttonHtml += `<a href="${row['官方網站']}" target="_blank" class="flex-1 bg-fuji-light hover:bg-fuji-primary text-fuji-primary hover:text-white border border-fuji-primary/20 rounded-lg py-1.5 text-[11px] font-bold text-center transition-all shadow-2xs flex items-center justify-center gap-1"><i class="fa-solid fa-earth-asia"></i>官方網站</a>`;
                    buttonHtml += `</div>`;
                }
                let cardHtml = `<div class="bg-fuji-paper p-4 rounded-xl shadow-sm border border-fuji-light/80 relative flex flex-col gap-1 transition-all"><div class="flex justify-between items-center text-[11px] font-bold text-fuji-primary mb-0.5"><span class="bg-fuji-light px-2 py-0.5 rounded-full flex items-center gap-1"><i class="fa-regular fa-clock text-[10px]"></i>${timeString}</span><span class="text-fuji-secondary/60 text-[10px]">📍 行程點</span></div><h3 class="text-base font-bold text-fuji-dark tracking-wide">${row['標題']}</h3>${row['說明'] ? `<p class="text-xs text-fuji-dark/80 mt-1 leading-relaxed text-justify bg-fuji-bg/20 p-2 rounded-lg border border-dashed border-fuji-light">${row['說明']}</p>` : ''}${imgHtml}${metaHtml}${buttonHtml}</div>`;
                if (row['分類'] === '重要') {
                    cardHtml = `<div class="bg-fuji-accent/10 border-l-4 border-fuji-accent p-3 rounded-xl shadow-sm bg-white"><div class="flex justify-between text-[11px] text-fuji-accent font-bold mb-1"><span class="bg-fuji-accent text-white px-1.5 py-0.5 rounded-full">${timeString}</span><span><i class="fa-solid fa-star fa-spin mr-1"></i>重要</span></div><p class="font-bold text-fuji-dark text-sm mt-1">${row['標題'] || '未命名行程'}</p>${row['說明'] ? `<p class="text-xs text-fuji-dark/80 mt-1 leading-relaxed bg-fuji-bg/50 p-2 rounded-lg text-justify">${row['說明']}</p>` : ''}<div class="mt-2">${metaHtml}</div><div class="mt-2">${buttonHtml}</div></div>`;
                }
                targetContainer.innerHTML += cardHtml;
            }
        }

        function parseImageUrl(url) {
            if (!url) return '';
            let cleanUrl = url.trim();
            if (cleanUrl.includes('drive.google.com')) {
                const match = cleanUrl.match(/(?:\/d\/|id=)([a-zA-Z0-9_-]{25,35})/);
                if (match && match[1]) return `https://docs.google.com/uc?export=view&id=${match[1]}`;
            }
            return cleanUrl;
        }

        async function fetchCloudShopping() {
            try {
                const response = await fetch(SHOPPING_CSV_URL);
                if (!response.ok) throw new Error();
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
                cloudShoppingItems = [];
                if (lines.length > 1) {
                    const headers = lines[0].split(',').map(h => h.replace(/["']/g, '').trim());
                    for (let i = 1; i < lines.length; i++) {
                        const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/["']/g, '').trim());
                        if (currentLine.length < 3 || !currentLine[2]) continue;
                        const storeName = currentLine[1] || '其他待辦事項';
                        const itemName = currentLine[2];
                        const itemQty = parseInt(currentLine[3]) || 1;
                        const itemNote = currentLine[4] || '';
                        const itemImage = currentLine[5] || '';
                        const itemLink = currentLine[6] || '';
                        cloudShoppingItems.push({
                            id: 'cloud-' + i,
                            logo: '',
                            store: storeName,
                            name: itemName,
                            qty: itemQty,
                            note: itemNote,
                            image: parseImageUrl(itemImage),
                            link: itemLink,
                            isCloud: true
                        });
                    }
                }
                renderCombinedShoppingList();
            } catch (e) {
                console.log("無法拉取雲端購物資料，切換為本地模式");
                renderCombinedShoppingList();
            }
        }

        function handleShoppingSubmit() {
            const name = document.getElementById('shop-item-name').value.trim();
            const qty = parseInt(document.getElementById('shop-item-qty').value) || 1;
            const store = document.getElementById('shop-item-store').value.trim() || '其他待辦事項';
            const note = document.getElementById('shop-item-note').value.trim();
            const imgUrl = document.getElementById('shop-item-image').value.trim();
            const linkUrl = document.getElementById('shop-item-link').value.trim();
            if (!name) { alert('請填寫商品名稱唷！'); return; }
            if (shoppingCollapsedStores[store] === undefined) { shoppingCollapsedStores[store] = true; }
            if (currentPostType === 'local') {
                const localItems = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
                localItems.push({ id: 'local-' + Date.now(), logo: '', store, name, qty, note, image: parseImageUrl(imgUrl), link: linkUrl, isCloud: false });
                localStorage.setItem('ok_shopping_local', JSON.stringify(localItems));
                clearShoppingForm();
                renderCombinedShoppingList();
            } else {
                if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes('請把')) { alert('尚未配置 GAS 網址。'); return; }
                const submitBtn = document.getElementById('add-shop-btn');
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1"></i>同步中...`;
                const payload = { store, name, qty, note, link: linkUrl, image: imgUrl };
                fetch(GAS_WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
                .then(() => {
                    alert(`🎉 【${name}】已成功同步至雲端！`);
                    clearShoppingForm();
                    setTimeout(fetchCloudShopping, 2000);
                }).catch(err => alert('發送失敗')).finally(() => {
                    submitBtn.disabled = false;
                    setPostType('cloud');
                });
            }
        }

        function clearShoppingForm() {
            document.getElementById('shop-item-name').value = '';
            document.getElementById('shop-item-qty').value = '1';
            document.getElementById('shop-item-store').value = '';
            document.getElementById('shop-item-note').value = '';
            document.getElementById('shop-item-image').value = '';
            document.getElementById('shop-item-link').value = '';
            document.getElementById('sec-shop-detail').classList.add('hidden');
            document.getElementById('sec-shop-arrow').className = "fa-solid fa-chevron-right text-[10px] transition-transform";
        }

        function renderCombinedShoppingList() {
            const container = document.getElementById('shopping-list-container');
            if (!container) return;
            container.innerHTML = '';
            const localItems = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
            const checkedIds = JSON.parse(localStorage.getItem('ok_shopping_checked_ids')) || [];
            const modifiedQtys = JSON.parse(localStorage.getItem('ok_shopping_qtys')) || {};
            const allItems = [...cloudShoppingItems, ...localItems];
            if (allItems.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-xs text-fuji-secondary font-medium">🛒 這裡空空如也，快在上方新增想買的藥妝吧！</div>`;
                return;
            }
            allItems.forEach(item => { if (modifiedQtys[item.id] !== undefined) { item.qty = modifiedQtys[item.id]; } });
            const groups = {};
            allItems.forEach(item => { if (!groups[item.store]) groups[item.store] = []; groups[item.store].push(item); });
            const sortedStores = Object.keys(groups).sort((a, b) => { if (a === '其他待辦事項') return 1; if (b === '其他待辦事項') return -1; return a.localeCompare(b, 'zh-TW'); });
            sortedStores.forEach(storeName => {
                const items = groups[storeName];
                if (shoppingCollapsedStores[storeName] === undefined) { shoppingCollapsedStores[storeName] = false; }
                const isCollapsed = shoppingCollapsedStores[storeName];
                const checkedCount = items.filter(i => checkedIds.includes(i.id)).length;
                let groupHtml = `<div class="bg-fuji-paper border border-fuji-light rounded-xl shadow-xs overflow-hidden transition-all"><div onclick="toggleStoreCollapse('${storeName}')" class="bg-fuji-light/20 border-b border-fuji-light/40 px-3 py-2.5 flex justify-between items-center cursor-pointer select-none hover:bg-fuji-light/40 transition-all"><div><span class="font-extrabold text-xs text-fuji-dark tracking-wide"><i class="fa-solid fa-store text-fuji-primary mr-1 text-[11px]"></i>${storeName}</span><span class="text-[9px] bg-fuji-primary/10 text-fuji-primary font-bold px-1.5 py-0.2 rounded-full ml-1.5">${checkedCount}/${items.length} 已購</span></div><div class="flex items-center gap-1.5"><i class="fa-solid fa-chevron-down text-[10px] text-fuji-primary transition-transform ${isCollapsed ? 'rotate-180' : ''}"></i></div></div><div class="${isCollapsed ? 'hidden' : ''} divide-y divide-fuji-light">`;
                items.forEach(item => {
                    const isChecked = checkedIds.includes(item.id);
                    groupHtml += `<div class="p-3 flex flex-col gap-1.5 transition-all relative ${isChecked ? 'bg-fuji-bg/30' : ''}"><div class="flex justify-between items-start gap-2"><div class="flex-1 min-w-0 cursor-pointer" onclick="toggleShoppingCheck('${item.id}')"><div class="flex items-center gap-1 flex-wrap"><span class="font-bold text-xs select-none break-all ${isChecked ? 'line-through text-fuji-secondary font-normal' : 'text-fuji-dark'}">${item.name}</span>${!item.isCloud ? `<span class="text-[8px] bg-amber-50 text-amber-600 font-bold px-1 rounded border border-amber-200">私人</span>` : ''}</div></div><div class="flex items-center gap-1 flex-shrink-0"><div class="flex items-center border border-fuji-light rounded-md bg-fuji-bg overflow-hidden shadow-2xs"><button onclick="adjustQty('${item.id}', -1)" class="px-1.5 py-0.5 text-fuji-primary text-xs font-bold"><i class="fa-solid fa-minus text-[9px]"></i></button><span class="px-1 text-xs font-extrabold text-fuji-dark min-w-[12px] text-center select-none">${item.qty}</span><button onclick="adjustQty('${item.id}', 1)" class="px-1.5 py-0.5 text-fuji-primary text-xs font-bold"><i class="fa-solid fa-plus text-[9px]"></i></button></div>${!item.isCloud ? `<button onclick="deleteLocalShoppingItem('${item.id}')" class="text-fuji-secondary hover:text-fuji-accent p-1 text-xs"><i class="fa-regular fa-trash-can text-[11px]"></i></button>` : '<div class="w-3"></div>'}</div></div><div class="cursor-pointer" onclick="toggleShoppingCheck('${item.id}')">${item.note ? `<div class="text-[10px] text-fuji-secondary font-medium break-all pt-0.5"><i class="fa-regular fa-comment-dots mr-0.5 text-fuji-secondary/70"></i>備註：${item.note}</div>` : ''}</div>`;
                    if (item.image) { groupHtml += `<div class="mt-1 max-w-[80px] rounded-lg overflow-hidden border border-fuji-light shadow-3xs"><img src="${item.image}" class="w-full object-cover max-h-16" onerror="this.parentElement.style.display='none'"></div>`; }
                    if (item.link) { groupHtml += `<div class="pt-0.5"><a href="${item.link}" target="_blank" class="inline-flex items-center gap-0.5 text-[9px] font-bold text-fuji-primary hover:underline bg-fuji-light/50 px-1.5 py-0.2 rounded"><i class="fa-solid fa-link text-[8px]"></i>查看商品連結</a></div>`; }
                    groupHtml += `</div>`;
                });
                groupHtml += `</div></div>`;
                container.innerHTML += groupHtml;
            });
        }

        function toggleShoppingCheck(id) {
            let checkedIds = JSON.parse(localStorage.getItem('ok_shopping_checked_ids')) || [];
            if (checkedIds.includes(id)) { checkedIds = checkedIds.filter(i => i !== id); } else { checkedIds.push(id); }
            localStorage.setItem('ok_shopping_checked_ids', JSON.stringify(checkedIds));
            renderCombinedShoppingList();
        }

        function adjustQty(id, delta) {
            event.stopPropagation();
            let modifiedQtys = JSON.parse(localStorage.getItem('ok_shopping_qtys')) || {};
            let currentQty = modifiedQtys[id];
            if (currentQty === undefined) {
                let found = cloudShoppingItems.find(i => i.id === id);
                if (!found) {
                    let locals = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
                    found = locals.find(i => i.id === id);
                }
                currentQty = found ? found.qty : 1;
            }
            let nextQty = currentQty + delta;
            if (nextQty < 1) nextQty = 1;
            modifiedQtys[id] = nextQty;
            localStorage.setItem('ok_shopping_qtys', JSON.stringify(modifiedQtys));
            renderCombinedShoppingList();
        }

        function deleteLocalShoppingItem(id) {
            event.stopPropagation();
            if (confirm('確定要移除此筆私人商品品項嗎？')) {
                let locals = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
                locals = locals.filter(i => i.id !== id);
                localStorage.setItem('ok_shopping_local', JSON.stringify(locals));
                renderCombinedShoppingList();
            }
        }

        function setPostType(type) {
            currentPostType = type;
            const btnLocal = document.getElementById('toggle-type-local');
            const btnCloud = document.getElementById('toggle-type-cloud');
            const actionBtn = document.getElementById('add-shop-btn');
            if (type === 'local') {
                if (btnLocal) btnLocal.className = "px-2 py-0.5 rounded-md bg-white text-amber-600 shadow-2xs transition-all flex items-center gap-0.5";
                if (btnCloud) btnCloud.className = "px-2 py-0.5 rounded-md text-fuji-secondary transition-all flex items-center gap-0.5";
                if (actionBtn) {
                    actionBtn.className = "w-full bg-amber-500 text-white text-xs font-bold py-2 rounded-lg shadow-md hover:bg-amber-600 transition-all";
                    actionBtn.innerHTML = `<i class="fa-solid fa-plus mr-1"></i>存入個人清單`;
                }
            } else {
                if (btnLocal) btnLocal.className = "px-2 py-0.5 rounded-md text-fuji-secondary transition-all flex items-center gap-0.5";
                if (btnCloud) btnCloud.className = "px-2 py-0.5 rounded-md bg-white text-fuji-primary shadow-2xs transition-all flex items-center gap-0.5";
                if (actionBtn) {
                    actionBtn.className = "w-full bg-fuji-primary text-white text-xs font-bold py-2 rounded-lg shadow-md hover:bg-fuji-dark transition-all";
                    actionBtn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-1"></i>同步至雲端共同清單`;
                }
            }
        }

        function initWalletDateTime() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const dateInput = document.getElementById('expense-date');
            if (dateInput) dateInput.value = `${yyyy}-${mm}-${dd}`;
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const timeInput = document.getElementById('expense-time');
            if (timeInput) timeInput.value = `${hh}:${min}`;
        }

        function toggleCardSelect() {
            const methodSelect = document.getElementById('expense-method');
            if (!methodSelect) return;
            const method = methodSelect.value;
            const cardSelect = document.getElementById('expense-card');
            if (!cardSelect) return;
            if (method === '信用卡') {
                cardSelect.disabled = false;
                cardSelect.className = "px-1.5 py-1.5 border border-fuji-light rounded-lg text-xs bg-fuji-bg focus:outline-none text-fuji-dark opacity-100";
            } else {
                cardSelect.disabled = true;
                cardSelect.value = "";
                cardSelect.className = "px-1.5 py-1.5 border border-fuji-light rounded-lg text-xs bg-fuji-bg focus:outline-none text-fuji-secondary opacity-50";
            }
        }

        function addExpense() {
            const store = document.getElementById('expense-store').value.trim() || '未分類店家';
            const title = document.getElementById('expense-title').value.trim();
            const date = document.getElementById('expense-date').value;
            const time = document.getElementById('expense-time').value;
            const amount = parseFloat(document.getElementById('expense-amount').value);
            const currency = document.getElementById('expense-currency').value;
            const method = document.getElementById('expense-method').value;
            const card = document.getElementById('expense-card').value;
            const note = document.getElementById('expense-note').value.trim();
            if (!title) { alert('請填寫買了什麼唷！'); return; }
            if (isNaN(amount) || amount <= 0) { alert('請輸入消費金額！'); return; }
            if (!date || !time) { alert('請確認日期時間。'); return; }
            const expenses = JSON.parse(localStorage.getItem('ok_wallet_expenses_v3')) || [];
            expenses.push({ id: 'exp-' + Date.now(), store, title, date, time, amount, currency, method, card, note });
            localStorage.setItem('ok_wallet_expenses_v3', JSON.stringify(expenses));
            document.getElementById('expense-store').value = '';
            document.getElementById('expense-title').value = '';
            document.getElementById('expense-amount').value = '';
            document.getElementById('expense-note').value = '';
            initWalletDateTime();
            document.getElementById('expense-method').value = '日幣現金';
            toggleCardSelect();
            renderExpenses();
        }

        function deleteExpense(id) {
            if (confirm('確定要移除此筆開銷紀錄嗎？')) {
                let expenses = JSON.parse(localStorage.getItem('ok_wallet_expenses_v3')) || [];
                expenses = expenses.filter(exp => exp.id !== id);
                localStorage.setItem('ok_wallet_expenses_v3', JSON.stringify(expenses));
                renderExpenses();
            }
        }

        function renderExpenses() {
            const container = document.getElementById('expense-list');
            if (!container) return;
            container.innerHTML = '';
            const expenses = JSON.parse(localStorage.getItem('ok_wallet_expenses_v3')) || [];
            const rate = parseFloat(document.getElementById('exchange-rate').value) || 0.215;
            let grandTotalJpy = 0;
            let grandTotalTwd = 0;
            expenses.forEach(exp => {
                let amt = exp.amount || 0;
                if (exp.currency === 'JPY') { grandTotalJpy += amt; grandTotalTwd += amt * rate; } else { grandTotalTwd += amt; grandTotalJpy += amt / rate; }
            });
            
            const tj = document.getElementById('total-jpy'); if(tj) tj.innerText = `¥ ${Math.round(grandTotalJpy).toLocaleString()}`;
            const tt = document.getElementById('total-twd'); if(tt) tt.innerText = `NT$ ${Math.round(grandTotalTwd).toLocaleString()}`;
            
            if (expenses.length === 0) { container.innerHTML = `<div class="text-center py-6 text-fuji-secondary/60 font-medium">💰 尚無記帳開銷紀錄，點選上方「快速記帳」開始吧！</div>`; return; }
            const daysGroup = {};
            expenses.forEach(exp => { if (!daysGroup[exp.date]) daysGroup[exp.date] = []; daysGroup[exp.date].push(exp); });
            const sortedDates = Object.keys(daysGroup).sort((a, b) => b.localeCompare(a));
            sortedDates.forEach(dateStr => {
                const items = daysGroup[dateStr];
                items.sort((a, b) => b.time.localeCompare(a.time));
                let dayTotalTwd = 0;
                items.forEach(item => { if (item.currency === 'JPY') { dayTotalTwd += item.amount * rate; } else { dayTotalTwd += item.amount; } });
                if (walletCollapsedDays[dateStr] === undefined) { walletCollapsedDays[dateStr] = false; }
                const isCollapsed = walletCollapsedDays[dateStr];
                let displayDate = dateStr;
                try { const parts = dateStr.split('-'); if (parts.length === 3) displayDate = `${parts[1]}/${parts[2]}`; } catch (e) {}
                let groupHtml = `<div class="space-y-1.5"><div onclick="toggleDayCollapse('${dateStr}')" class="flex justify-between items-center px-1 py-1 cursor-pointer select-none"><div><span class="font-extrabold text-xs text-fuji-primary tracking-wide"><i class="fa-regular fa-calendar mr-1 text-[11px]"></i>${displayDate}</span></div><div class="text-[10px] bg-fuji-dark text-white px-2 py-0.5 rounded font-cute">當天小計: NT$ ${Math.round(dayTotalTwd).toLocaleString()}</div></div><div class="${isCollapsed ? 'hidden' : ''} bg-fuji-paper rounded-xl border border-fuji-light shadow-sm overflow-hidden divide-y divide-fuji-light bg-white">`;
                items.forEach(item => {
                    const isChecked = item.currency === 'JPY';
                    const displayAmt = isChecked ? `¥${item.amount.toLocaleString()}` : `$${item.amount.toLocaleString()}`;
                    const subAmt = isChecked ? `約 $${Math.round(item.amount * rate)}` : `約 ¥${Math.round(item.amount / rate)}`;
                    groupHtml += `<div class="p-3 flex justify-between items-center gap-2 hover:bg-fuji-bg/20 transition-all"><div class="min-w-0 flex-1 space-y-1"><div class="flex items-center gap-1.5 flex-wrap"><span class="text-[9px] bg-fuji-primary text-white px-1.5 py-0.5 rounded font-bold inline-flex items-center gap-0.5 flex-shrink-0"><i class="fa-solid fa-store text-[8px]"></i>${item.store}</span><span class="font-bold text-xs text-fuji-dark break-all">${item.title}</span></div><div class="text-[10px] text-fuji-secondary font-medium flex items-center gap-1.5 flex-wrap"><span><i class="fa-regular fa-clock text-[9px]"></i>${item.time}</span><span>•</span><span class="font-bold bg-fuji-light/70 px-1 py-0.2 rounded text-fuji-dark">${item.method}${item.card ? ` (${item.card})` : ''}</span></div>${item.note ? `<div class="text-[10px] text-fuji-secondary font-medium break-all pt-0.5"><i class="fa-regular fa-comment-dots mr-0.5"></i>備註：${item.note}</div>` : ''}</div><div class="flex items-center gap-2 flex-shrink-0"><div class="text-right"><div class="font-cute font-extrabold text-xs text-fuji-dark">${displayAmt}</div><div class="text-[9px] text-fuji-secondary font-bold">${subAmt}</div></div><button onclick="deleteExpense('${item.id}')" class="text-fuji-secondary/40 hover:text-fuji-accent p-1 transition-all"><i class="fa-regular fa-trash-can text-[11px]"></i></button></div></div>`;
                });
                groupHtml += `</div></div>`;
                container.innerHTML += groupHtml;
            });
        }

        // 行前行李同步抓取器（對應準備分頁）
        async function fetchCloudChecklist() {
            try {
                const response = await fetch(CHECKLIST_CSV_URL); 
                if (!response.ok) throw new Error();
                const csvText = await response.text();
                const userCheckedStates = JSON.parse(localStorage.getItem('ok_checklist_user_checked')) || {};
                const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
                globalChecklistItems = [];
                
                if (lines.length > 1) {
                    for (let i = 1; i < lines.length; i++) {
                        const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/["']/g, '').trim());
                        if (currentLine.length < 4 || !currentLine[3]) continue; 
                        
                        const itemId = currentLine[0] || 'chk-' + i;       
                        const catName = currentLine[1] || '其他未分類';     
                        const typeName = currentLine[2] || '';             
                        const itemText = currentLine[3];                   
                        const itemQty = parseInt(currentLine[4]) || 1;     
                        const itemNote = currentLine[5] || '';             
                        
                        if (checklistCollapsedCategories[catName] === undefined) {
                            checklistCollapsedCategories[catName] = false;
                        }
                        
                        globalChecklistItems.push({
                            id: itemId,
                            category: catName,
                            type: typeName,
                            text: itemText,
                            qty: itemQty,
                            note: itemNote,
                            checked: userCheckedStates[itemId] === true
                        });
                    }
                }
                renderChecklist(globalChecklistItems);
            } catch (error) {
                console.error("行前準備清單拉取異常:", error);
                const cc = document.getElementById('checklist-container');
                if(cc) cc.innerHTML = `<div class="text-center py-8 text-sm text-fuji-accent font-medium"><i class="fa-solid fa-triangle-exclamation mr-1"></i> 無法從雲端同步「準備」分頁資料。</div>`;
            }
        }

        function renderChecklist(items) {
            const container = document.getElementById('checklist-container');
            if (!container) return;
            container.innerHTML = '';
            
            if (!items || items.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-sm text-fuji-secondary font-medium">✨ 雲端清單中尚無任何準備項目。</div>`;
                return;
            }
            
            const categoryGroups = {};
            items.forEach(item => {
                const cat = item.category;
                if (!categoryGroups[cat]) categoryGroups[cat] = [];
                categoryGroups[cat].push(item);
            });
            
            for (const [categoryName, categoryItems] of Object.entries(categoryGroups)) {
                const isCollapsed = checklistCollapsedCategories[categoryName] === true;
                const checkedCount = categoryItems.filter(i => i.checked).length;
                
                let catHtml = `<div class="bg-fuji-paper border border-fuji-light rounded-2xl shadow-xs overflow-hidden transition-all bg-white"><div onclick="toggleChecklistCategoryCollapse('${categoryName}')" class="bg-fuji-light/20 border-b border-fuji-light/40 px-4 py-3 flex justify-between items-center cursor-pointer select-none hover:bg-fuji-light/40 transition-all"><div><span class="font-extrabold text-sm text-fuji-dark tracking-wide"><i class="fa-solid fa-boxes-packing text-fuji-primary mr-1.5"></i>${categoryName}</span><span class="text-[10px] bg-fuji-primary/10 text-fuji-primary font-bold px-2 py-0.5 rounded-full ml-2">${checkedCount}/${categoryItems.length} 完成</span></div><i class="fa-solid fa-chevron-down text-xs text-fuji-primary transition-transform ${isCollapsed ? 'rotate-180' : ''}"></i></div><div class="${isCollapsed ? 'hidden' : ''} p-4 space-y-4">`;
                        
                const typeGroups = {};
                categoryItems.forEach(item => {
                    const type = item.type;
                    if (!typeGroups[type]) typeGroups[type] = [];
                    typeGroups[type].push(item);
                });
                
                for (const [typeName, subItems] of Object.entries(typeGroups)) {
                    const isDefaultGroup = (typeName === "");
                    catHtml += `<div class="space-y-2.5"><div class="flex items-center gap-1.5 text-xs font-bold ${isDefaultGroup ? 'text-fuji-secondary/60' : 'text-fuji-accent bg-amber-500/5 px-2 py-0.5 rounded w-fit text-[11px]'}" style="letter-spacing: 0.02em;"><i class="fa-solid ${isDefaultGroup ? 'fa-circle-notch text-[7px]' : 'fa-folder-open'}"></i><span>${isDefaultGroup ? '一般準備項目' : typeName}</span></div><div class="pl-1 space-y-3">`;
                            
                    subItems.forEach(item => {
                        const isChecked = item.checked === true;
                        catHtml += `<label class="flex items-start gap-3 text-sm text-fuji-dark font-medium cursor-pointer select-none group min-h-[20px]"><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheck('${item.id}')" class="mt-0.5 accent-fuji-primary h-4 w-4 rounded flex-shrink-0"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap"><span class="${isChecked ? 'line-through text-fuji-secondary font-normal' : 'font-bold text-fuji-dark text-[14px]'} break-all">${item.text}</span><span class="text-[10px] font-extrabold px-2 py-0.2 bg-fuji-bg border border-fuji-light text-fuji-primary rounded-md shadow-3xs">x ${item.qty}</span></div>${item.note ? `<p class="text-[11px] text-fuji-secondary/90 font-medium mt-1 leading-normal break-all"><i class="fa-regular fa-comment-dots text-[10px] mr-0.5 text-fuji-secondary"></i>${item.note}</p>` : ''}</div></label>`;
                    });
                    
                    catHtml += `</div></div>`;
                }
                
                catHtml += `</div></div>`;
                container.innerHTML += catHtml;
            }
        }

        function toggleCheck(id) {
            const userCheckedStates = JSON.parse(localStorage.getItem('ok_checklist_user_checked')) || {};
            globalChecklistItems = globalChecklistItems.map(item => {
                if (item.id === id) {
                    const nextState = !item.checked;
                    userCheckedStates[id] = nextState; 
                    return { ...item, checked: nextState };
                }
                return item;
            });
            localStorage.setItem('ok_checklist_user_checked', JSON.stringify(userCheckedStates));
            renderChecklist(globalChecklistItems);
        }

        function initCalc() {
            const input = document.getElementById('calc-input'); if(!input) return;
            input.addEventListener('input', function() {
                const rate = parseFloat(document.getElementById('exchange-rate').value) || 0.215;
                try {
                    let sanitized = this.value.replace(/[^0-9+\\-*/().]/g, '');
                    if(!sanitized) { document.getElementById('calc-jpy').innerText = '0'; document.getElementById('calc-twd').innerText = 'NT$ 0'; return; }
                    let jpy = Function('"use strict";return (' + sanitized + ')')() || 0;
                    jpy = Math.round(jpy); document.getElementById('calc-jpy').innerText = jpy;
                    document.getElementById('calc-twd').innerText = 'NT$ ' + Math.round(jpy * rate).toLocaleString();
                } catch(e) {}
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(`page-${tabId}`);
            if(target) target.classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('text-fuji-accent');
                el.classList.add('text-fuji-secondary');
            });
            const activeNav = document.getElementById(`nav-${tabId}`);
            if(activeNav) {
                activeNav.classList.remove('text-fuji-secondary');
                activeNav.classList.add('text-fuji-accent');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchDay(dayId) {
            document.querySelectorAll('.day-timeline').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(`day-${dayId}`);
            if(target) target.classList.remove('hidden');
            document.querySelectorAll('.day-btn').forEach(el => {
                el.classList.remove('bg-fuji-primary', 'text-white');
                el.classList.add('bg-fuji-paper', 'text-fuji-primary', 'border', 'border-fuji-light');
            });
            const btn = document.getElementById(`btn-${dayId}`);
            if(btn) {
                btn.className = "day-btn px-2.5 py-1 bg-fuji-primary text-white rounded-full shadow-sm transition-all";
            }
        }
    </script>
</body>
