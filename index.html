<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>OKINAWA 2026</title>
</head>
<body class="bg-stone-50 p-4 font-serif">
  <h1 class="text-2xl font-bold text-center mb-6">OKINAWA 2026</h1>
   
  <div id="app" class="max-w-sm mx-auto space-y-4">
    <p class="text-center">載入中...</p>
  </div>

  <script>
    // 這裡替換成您 Google Sheet 發佈的 CSV 連結
    const csvUrl = 'YOUR_CSV_URL_HERE';

    async function fetchData() {
      const res = await fetch(csvUrl);
      const csvText = await res.text();
      const rows = csvText.split('\n').slice(1);
      
      const app = document.getElementById('app');
      app.innerHTML = ''; // 清空載入中

      rows.forEach(row => {
        const [day, timeStart, timeEnd, title, desc] = row.split(',');
        if(!title) return;
        
        app.innerHTML += `
          <div class="border-b pb-2">
            <div class="text-xs text-gray-500">${timeStart} - ${timeEnd}</div>
            <div class="font-bold">${title}</div>
            <div class="text-sm text-gray-600">${desc}</div>
          </div>
        `;
      });
    }
    fetchData();
  </script>
</body>
</html>
